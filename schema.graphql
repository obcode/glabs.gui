# ----- activity.graphqls -----
"""
One recorded operation performed through the web against an assignment — the
web's stand-in for the shell history the CLI leaves behind. The course page reads
it to show, per assignment, what has already happened (setaccess, protect,
archive, delete; later generate).
"""
type ActivityEntry {
  "The assignment this entry is about (its name within the course)."
  assignment: String!
  "The operation that ran (setaccess, protect, archive, delete, …)."
  op: String!
  "The terminal outcome: `done` or `failed`."
  status: String!
  "A short human summary — the repository count on success, the error on failure."
  detail: String!
  "When the operation finished."
  at: Time!
}

extend type Query {
  "The activity log of one of the caller's assignments, newest first."
  assignmentActivity(course: String!, name: String!): [ActivityEntry!]!
  "The activity log across a whole course of the caller's, newest first (the GUI groups it by assignment for a per-assignment status)."
  courseActivity(course: String!): [ActivityEntry!]!
}

# ----- assignments.graphqls -----
"""
The assignment editor is schema-driven: the GUI renders a guided, validated form
from this server-authoritative metadata, so labels, help text and dropdown
options live in exactly one place.
"""
type FieldMeta {
  "Config key, e.g. `per` or `accesslevel`."
  key: String!
  "Human-readable label for the form."
  label: String!
  "Short help text describing what the field does."
  description: String!
  "Section this field belongs to (empty for the top-level group), e.g. `startercode`. Lets the GUI render grouped sections."
  group: String!
  "The input shape the GUI should render."
  kind: FieldKind!
  "Whether the field must be set for a concrete (non-abstract) assignment."
  required: Boolean!
  "Whether the field is deprecated (shown but discouraged)."
  deprecated: Boolean!
  "An example value for the input placeholder, if any."
  example: String
  "Dropdown options for an ENUM field (empty otherwise)."
  options: [FieldOption!]!
}

"One choice of an ENUM field — a dropdown entry with its own short description."
type FieldOption {
  value: String!
  label: String!
  description: String!
}

"""
One field's own (source) value for an assignment — what the user wrote, before
inheritance. Values are stringified (booleans as `true`/`false`) and keyed by the
same `key` as FieldMeta, so the GUI can pre-fill each schema field generically.
"""
type FieldValue {
  key: String!
  value: String!
}

"The input shape the GUI should render for a field."
enum FieldKind {
  STRING
  BOOL
  ENUM
  INT
  STRINGLIST
}

"""
One assignment in source (own) form plus its resolved preview — the same
rendering `glabs show` produces, so inheritance is visible.
"""
type AssignmentView {
  course: String!
  name: String!
  "The assignment this one inherits from, if any (`extends`)."
  extends: String
  "The names of the sibling assignments this one may inherit from — all assignments in the same course except this one (`extends` is course-internal). The valid choices for the editor's inheritance dropdown."
  extendsOptions: [String!]!
  "Whether this is an abstract base (a template for `extends`)."
  abstract: Boolean!
  "The assignment's own (source) field values, keyed by FieldMeta.key, for pre-filling the editor form."
  own: [FieldValue!]!
  "The resolved config rendered as text (may contain ANSI); empty when resolveError is set."
  resolved: String!
  "Why the assignment could not be resolved (e.g. abstract base, missing parent) — not an error."
  resolveError: String
}

"One field's drafted value, keyed by FieldMeta.key. Booleans as `true`/`false`; empty string unsets the field (so it inherits)."
input FieldValueInput {
  key: String!
  value: String!
}

"""
Result of validating a draft assignment against the real resolver (the same one
the CLI uses), without saving.
"""
type ValidationResult {
  "Whether the draft is structurally sound and could be saved."
  ok: Boolean!
  "Hard errors that make the draft unsaveable (empty when ok)."
  errors: [String!]!
  "The resolved config preview (Show() output, may contain ANSI) when the draft resolves."
  resolved: String
  "Why there is no preview though the draft is ok — e.g. an abstract base."
  resolveError: String
}

extend type Query {
  "Field metadata for the assignment editor (server-authoritative labels, descriptions, dropdown options)."
  assignmentSchema: [FieldMeta!]!
  "Field metadata for one branch rule — a row of the repeat-group `branches` list."
  branchRuleSchema: [FieldMeta!]!
  "Field metadata for the mergeRequest approval settings (tri-state; empty ENUM option means unset)."
  approvalSettingsSchema: [FieldMeta!]!
  "Field metadata for one approval rule — a row of the repeat-group `approvals.rules` list."
  approvalRuleSchema: [FieldMeta!]!
  "One assignment of one of the caller's courses: source values, resolved preview. Null when there is no such assignment."
  assignment(course: String!, name: String!): AssignmentView
  "Validate a draft assignment against the real resolver without saving."
  validateAssignmentDraft(course: String!, name: String!, draft: [FieldValueInput!]!): ValidationResult!
  "The repository URLs for one assignment, derived from the resolved config (no GitLab token needed). Null when there is no such assignment or it cannot be resolved (e.g. an abstract base)."
  assignmentUrls(course: String!, name: String!): AssignmentUrls
}

"""
The repository URLs for one assignment: the assignment-level group URL plus one
URL per student or per group. Read-only and derived purely from the resolved
configuration — no GitLab token or API call is involved.
"""
type AssignmentUrls {
  "Whether repos are per student or per group (`student` or `group`)."
  per: String!
  "The assignment-level group URL, where all the repos live."
  groupUrl: String!
  "One entry per student/group repository."
  repos: [RepoUrl!]!
}

"One repository URL together with who it belongs to."
type RepoUrl {
  "The student's email (or username/id fallback) or the group's name."
  for: String!
  "The full web URL of the repository."
  url: String!
}

extend type Mutation {
  "Apply a draft to one of the caller's assignments, creating it if it does not exist: validate, then persist (re-marshals the course YAML). Rejects a concrete draft that does not resolve."
  setAssignment(course: String!, name: String!, draft: [FieldValueInput!]!): AssignmentView!
  "Import a single assignment into one of the caller's courses from a YAML snippet keyed by the assignment name (as it appears in a course file), upserting it: validate against the real resolver, then persist. Rejects a concrete assignment that does not resolve."
  importAssignmentYAML(course: String!, yaml: String!): AssignmentView!
  "Copy one of the caller's assignments to a new name within the same course. Only the name must be unique; the copy is otherwise identical (including `extends`). Rejects a name that already exists or is not path-safe."
  copyAssignment(course: String!, from: String!, newName: String!): AssignmentView!
  "Rename one of the caller's assignments within a course. Any sibling that inherits from the old name via `extends` is repointed to the new name. Rejects a name that already exists or is not path-safe."
  renameAssignment(course: String!, oldName: String!, newName: String!): AssignmentView!
  "Delete one assignment from one of the caller's courses. Returns false if there was no such assignment."
  deleteAssignment(course: String!, name: String!): Boolean!
}

# ----- check.graphqls -----
"""
The result of checking a course's roster against GitLab: each roster entry
classified, plus the students that appear in more than one group. Fetched with the
caller's stored token.
"""
type CheckResult {
  course: String!
  "The course-level students, classified in configured order."
  students: [StudentCheck!]!
  "The course's groups, each with its members classified."
  groups: [GroupCheck!]!
  "Students that appear in more than one group."
  duplicates: [DuplicateCheck!]!
  "Number of hard problems (unresolvable entries + duplicates)."
  errors: Int!
  "Whether the whole course checks out (errors = 0)."
  ok: Boolean!
}

"One roster entry classified against GitLab."
type StudentCheck {
  "The raw roster entry, as written."
  input: String!
  status: StudentCheckStatus!
  "Human-readable detail (the resolved user, or why it failed)."
  message: String!
}

"How a roster entry resolved against GitLab."
enum StudentCheckStatus {
  "Resolved (pinned by ID, or matched uniquely by email)."
  OK
  "No GitLab user yet, but there is an email → will be invited."
  INVITE
  "Resolved by username — works, but pinning by ID is safer."
  DEPRECATED
  "Cannot resolve and there is no email to fall back to."
  ERROR
}

"One group's members, classified."
type GroupCheck {
  name: String!
  members: [StudentCheck!]!
}

"One student that appears in more than one group."
type DuplicateCheck {
  student: String!
  groups: [String!]!
}

"""
One event while a course check runs: a progress line as each entry is checked, or
the single final event (done = true) carrying the result or an error.
"""
type CheckProgress {
  message: String!
  done: Boolean!
  result: CheckResult
  error: String
}

extend type Query {
  """
  Check a course's roster against GitLab with the caller's stored token (one-shot,
  no progress). Null when there is no such course; errors when no token is stored
  or GitLab is unreachable.
  """
  courseCheck(name: String!): CheckResult
}

extend type Subscription {
  """
  Check a course's roster and stream progress per entry, ending with one done event
  carrying the result. Same semantics as courseCheck, but with live progress.
  """
  courseCheckProgress(name: String!): CheckProgress!
}

# ----- courses.graphqls -----
"""
A course as stored for the current user. Each user sees only their own courses;
there is no way to reach another user's course.
"""
type Course {
  name: String!
  coursePath: String!
  semesterPath: String!
  "Whether the course name is prepended to each project path."
  useCoursenameAsPrefix: Boolean!
  "Whether the student's email domain is appended as a suffix (default true)."
  useEmailDomainAsSuffix: Boolean!
  "The names of the assignments in this course, sorted."
  assignmentNames: [String!]!
  "The course-level students (emails), as stored."
  students: [String!]!
  "The course-level groups, sorted by name."
  groups: [Group!]!
  studentCount: Int!
  groupCount: Int!
  importedAt: Time!
  updatedAt: Time!
}

"A named group of members (emails)."
type Group {
  name: String!
  members: [String!]!
}

"A named group of members (emails), for setCourseGroups."
input GroupInput {
  name: String!
  members: [String!]!
}

"""One lint finding: configuration that does not do what it looks like it does."""
type Finding {
  path: String!
  message: String!
  severity: FindingSeverity!
}

enum FindingSeverity {
  "The setting is present but has no effect."
  PROBLEM
  "It works, but the spelling or shape is obsolete."
  DEPRECATED
}

scalar Time

extend type Query {
  "The current user's courses."
  courses: [Course!]!
  "One of the current user's courses, or null if there is none by that name."
  course(name: String!): Course
  "The course as a downloadable YAML file (the original upload if unedited)."
  courseYAML(name: String!): String!
  "Lint findings for one of the current user's courses."
  courseLint(name: String!): [Finding!]!
}

type Mutation {
  "Import a course from an uploaded YAML file, replacing any course of the same name."
  importCourseYAML(yaml: String!): Course!
  """
  Create a new, empty course from scratch. Fails if the caller already has a
  course by that name (use setAssignment to add assignments afterwards).
  """
  createCourse(
    name: String!
    coursePath: String!
    semesterPath: String!
    useCoursenameAsPrefix: Boolean!
    useEmailDomainAsSuffix: Boolean!
  ): Course!
  "Update the course-level settings of one of the caller's courses (assignments, students and groups are untouched)."
  setCourse(
    name: String!
    coursePath: String!
    semesterPath: String!
    useCoursenameAsPrefix: Boolean!
    useEmailDomainAsSuffix: Boolean!
  ): Course!
  "Replace the course-level students (emails) of one of the caller's courses. The GUI merges additively before calling this."
  setCourseStudents(name: String!, students: [String!]!): Course!
  "Replace the course-level groups of one of the caller's courses. The GUI merges additively before calling this."
  setCourseGroups(name: String!, groups: [GroupInput!]!): Course!
  "Rename one of the caller's courses. The course name is the YAML file's top-level key, so this re-encodes the raw bytes. Rejects a new name that already exists or is not path-safe."
  renameCourse(oldName: String!, newName: String!): Course!
  "Delete one of the current user's courses."
  deleteCourse(name: String!): Boolean!
}

# ----- gitlab_token.graphqls -----
"""
Whether the current user has stored a GitLab token, and when it was last set.
The token itself is never returned by any query.
"""
type GitLabTokenStatus {
  set: Boolean!
  updatedAt: Time
}

extend type Query {
  "Whether the current user has a stored GitLab token."
  gitlabToken: GitLabTokenStatus!
}

extend type Mutation {
  """
  Store the current user's GitLab personal access token, AES-256-GCM encrypted in
  the database. Write-only: the token is never returned. Needs the api and
  write_repository scopes, and secrets.key configured on the server.
  """
  setGitlabToken(token: String!): GitLabTokenStatus!
  "Remove the current user's stored GitLab token."
  removeGitlabToken: GitLabTokenStatus!
}

# ----- op.graphqls -----
"A mutating GitLab operation. None of them touch git — pure GitLab API calls."
enum Op {
  SETACCESS
  PROTECT
  ARCHIVE
  DELETE
  GENERATE
  UPDATE
}

"Optional parameters for an operation (op-specific; unset fields fall back to the assignment config)."
input OpParams {
  "setaccess: the access level to grant (guest|reporter|developer|maintainer)."
  accessLevel: String
  "protect: the branch to protect."
  branch: String
  "archive: unarchive instead of archive."
  unarchive: Boolean
  "generate: create repos and push starter code but do NOT add/invite students or groups (for debugging)."
  skipInvite: Boolean
}

"One repository an operation would touch."
type PlannedTarget {
  "The student's email (or username/id) or the group's name."
  for: String!
  "The repository's project name."
  repo: String!
  "The full web URL of the repository."
  url: String!
}

"""
The preview of a mutating operation before it runs: the resolved config, the
repositories it would touch, warnings, and an opaque confirm token (5 min TTL) that
carries a hash of the resolved config — so runOp can reject a plan whose config
changed underneath it.
"""
type OpPlan {
  op: Op!
  course: String!
  assignment: String!
  "The resolved config, exactly as `glabs show` renders it (may contain ANSI)."
  resolved: String!
  targets: [PlannedTarget!]!
  warnings: [String!]!
  "Whether the operation is destructive (archive/delete) and needs the confirm phrase."
  destructive: Boolean!
  "For destructive ops: the phrase the user must type to confirm (the assignment path)."
  confirmPhrase: String
  "Opaque, single-use confirm token to pass to runOp/scheduleOp."
  token: String!
  expiresAt: Time!
}

extend type Mutation {
  """
  Plan a mutating GitLab operation: resolve the assignment, list the repositories it
  would touch and any warnings, and return a confirm token (5 min TTL) carrying a
  hash of the resolved config. No GitLab call is made — this is a token-free preview.
  """
  planOp(op: Op!, course: String!, assignment: String!, params: OpParams, onlyFor: [String!]): OpPlan!
}

"The severity/kind of one streamed output line."
enum LogLevel {
  INFO
  WARN
  ERROR
  PROGRESS
  RESULT
  DONE
}

"One line of a running operation's streamed output."
type LogLine {
  level: LogLevel!
  "The line text (ANSI stripped)."
  text: String!
}

extend type Subscription {
  """
  Run a planned operation against GitLab (from planOp's token) and stream its output
  line by line, ending with a DONE line. The operation keeps running server-side even
  if the client disconnects (closing the tab does NOT abort it). A second operation on
  the same assignment is rejected while one runs. For a destructive op (archive/delete)
  confirmPhrase must equal the plan's confirmPhrase.
  """
  runOp(token: String!, confirmPhrase: String): LogLine!
}

# ----- report.graphqls -----
"""
A live report over the repositories of one assignment — one row per project
(repo) with activity, last commit, open issues/merge requests, members and an
optional release status. Fetched from GitLab using the caller's stored token.
"""
type AssignmentReport {
  course: String!
  assignment: String!
  "The assignment-level group URL."
  url: String!
  description: String!
  "When the report was generated."
  generated: Time
  "Whether the assignment configures a release merge request (adds that column)."
  hasReleaseMergeRequest: Boolean!
  "Whether the assignment configures release docker images (adds that column)."
  hasReleaseDockerImages: Boolean!
  "One entry per repository in the assignment's group, sorted by name."
  projects: [ProjectReport!]!
}

"The report for one repository."
type ProjectReport {
  name: String!
  "Whether there was any activity beyond creation (or any commits)."
  active: Boolean!
  emptyRepo: Boolean!
  commits: Int!
  createdAt: Time
  lastActivity: Time
  lastCommit: CommitReport
  openIssuesCount: Int!
  openMergeRequestsCount: Int!
  webUrl: String!
  members: [ProjectMemberReport!]!
  release: ReleaseReport
}

"The most recent commit across a repository's branches."
type CommitReport {
  title: String!
  committerName: String!
  committedDate: Time
  webUrl: String!
}

"A member of a repository (only the display fields, never GitLab-internal ids)."
type ProjectMemberReport {
  name: String!
  username: String!
  webUrl: String!
}

"The release status of a repository, when the assignment configures a release."
type ReleaseReport {
  mergeRequest: ReleaseMergeRequestReport
  dockerImages: DockerImagesReport
}

type ReleaseMergeRequestReport {
  found: Boolean!
  webUrl: String!
  pipelineStatus: String!
}

type DockerImagesReport {
  status: String!
  images: [DockerImageReport!]!
}

type DockerImageReport {
  wanted: String!
  image: String
}

extend type Query {
  """
  A live report over the repositories of one assignment, fetched from GitLab with
  the caller's stored token. Null when there is no such assignment or it cannot be
  resolved (e.g. an abstract base). Errors when no token is stored or GitLab is
  unreachable.
  """
  assignmentReport(course: String!, name: String!): AssignmentReport
}

"""
One event while a report is being generated: a progress line as it is fetched, or
the single final event (done = true) carrying the finished report or an error.
"""
type ReportProgress {
  "A human-readable progress line; empty on the final event."
  message: String!
  "True on the final event; then no more events follow."
  done: Boolean!
  "The finished report — set only on the final event, and only if it succeeded."
  report: AssignmentReport
  "Why generation failed — set only on the final event on failure."
  error: String
}

type Subscription {
  """
  Generate an assignment report and stream the GitLab client's progress as it
  goes, ending with one done event carrying the report (or an error). Same
  semantics as the assignmentReport query, but with live progress.
  """
  assignmentReportProgress(course: String!, name: String!): ReportProgress!
}

# ----- scheduling.graphqls -----
"The lifecycle state of a scheduled job. It starts PENDING, is claimed to RUNNING, and ends in exactly one terminal state."
enum JobStatus {
  PENDING
  RUNNING
  DONE
  FAILED
  EXPIRED
  CANCELLED
}

"One key/value operation parameter of a scheduled job (e.g. accessLevel, branch)."
type JobParam {
  key: String!
  value: String!
}

"""
A mutating operation queued to run at a wall-clock time. It is persisted in Mongo,
so it survives restarts and a missed run is caught up after downtime; the runner
re-checks the plan's config hash and a stored GitLab token when it fires, and
emails the outcome.
"""
type ScheduledJob {
  id: ID!
  "The operation (setaccess, protect, archive, delete)."
  op: String!
  course: String!
  assignment: String!
  "The subset of students/groups the op targets (empty = all)."
  onlyFor: [String!]!
  "Op-specific parameters (e.g. accessLevel), sorted by key."
  params: [JobParam!]!
  "When the job is scheduled to run."
  runAt: Time!
  "How long after runAt the job may still start before it is marked EXPIRED."
  graceMinutes: Int!
  status: JobStatus!
  createdAt: Time!
  startedAt: Time
  finishedAt: Time
  "The error message when the job FAILED or EXPIRED."
  err: String
}

extend type Mutation {
  """
  Schedule a planned mutating operation (from planOp's token) to run at runAt. Reuses
  the SAME confirm token as runOp; the token's config hash is re-checked when the job
  fires. graceMinutes defaults to 60. For a destructive op (archive/delete)
  confirmPhrase must equal the plan's confirmPhrase. Requires a stored GitLab token.
  """
  scheduleOp(token: String!, runAt: Time!, graceMinutes: Int, confirmPhrase: String): ScheduledJob!
  "Cancel one of the caller's PENDING jobs. A running or finished job cannot be cancelled."
  cancelScheduledJob(id: ID!): ScheduledJob!
}

extend type Query {
  "The caller's scheduled jobs, newest scheduled first, optionally filtered by status."
  scheduledJobs(status: [JobStatus!]): [ScheduledJob!]!
  "One of the caller's scheduled jobs."
  scheduledJob(id: ID!): ScheduledJob
}

# ----- schema.graphqls -----
"""
An authenticated user of glabs-web. Identity comes from the auth proxy; there
are no roles — each user manages only their own courses.
"""
type User {
  email: String!
  name: String!
}

"""Version and build metadata for the running server."""
type ServerInfo {
  version: String!
  commit: String!
  date: String!
}

type Query {
  "The currently authenticated user."
  me: User!
  "Version and build metadata."
  serverInfo: ServerInfo!
}
