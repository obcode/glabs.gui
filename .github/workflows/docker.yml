name: Create and publish a Docker image

on:
  # Triggered explicitly from ci.yml after a release (the release is created with
  # GITHUB_TOKEN, which does not fire the `release` event). The `release` trigger
  # is kept for a manually published release.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.2.0)'
        required: true
        type: string
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # The release tag to build, from whichever trigger fired.
    env:
      VERSION: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Build the released code, not whatever is on main now.
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag the image with the release tag and latest (works for both triggers).
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GUI-Version aus dem Release-Tag (z. B. v1.2.0) in den Build reichen;
          # vite.config.js liest sie als APP_VERSION.
          build-args: |
            APP_VERSION=${{ env.VERSION }}

  # Der Deploy-Job (Self-hosted-Runner, on-host docker-compose) kommt mit
  # Meilenstein F (deploy/), zusammen mit Caddyfile + docker-compose.yml.
