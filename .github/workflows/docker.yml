name: Create and publish a Docker image

on:
  # Triggered explicitly from ci.yml after a release (the release is created with
  # GITHUB_TOKEN, which does not fire the `release` event). The `release` trigger
  # is kept for a manually published release.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.2.0)'
        required: true
        type: string
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # The release tag to build, from whichever trigger fired.
    env:
      VERSION: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Build the released code, not whatever is on main now.
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      # Build with the docker-container driver, not the default `docker` driver.
      # The default driver's direct push to ghcr.io intermittently fails with
      # "ERROR: unknown blob" (the image builds fine, but the push references
      # blobs the registry session doesn't have). buildx + docker-container
      # uploads layers cleanly.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag the image with the release tag and latest (works for both triggers).
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GUI-Version aus dem Release-Tag (z. B. v1.2.0) in den Build reichen;
          # vite.config.js liest sie als APP_VERSION.
          build-args: |
            APP_VERSION=${{ env.VERSION }}

  # Roll the freshly pushed GUI image onto the deploy host. Mirror image of the backend
  # (obcode/glabs) deploy job: same self-hosted runner label (glabs-deploy), same on-host
  # deploy dir — but this job touches ONLY the `gui` service. The docker-compose.yml itself
  # is synced by the backend repo's deploy job; here we just pin GUI_TAG and roll gui.
  deploy:
    needs: build-and-push-image
    # Gate like the backend: only deploy once the GUI runner exists (repo variable
    # AUTO_DEPLOY=true). Until then the image is still built & pushed; this job is skipped.
    if: ${{ vars.AUTO_DEPLOY == 'true' }}
    runs-on: [self-hosted, glabs-deploy]
    env:
      # The v-prefixed release tag (from whichever trigger fired). docker/metadata-action
      # tags the image with this raw ref (v1.53.0), so GUI_TAG must carry the v too.
      VERSION: ${{ github.event.release.tag_name || inputs.tag }}
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/home/obraun/glabs/deploy' }}
    steps:
      - name: Deploy pinned GUI image
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          sed -i "s/^GUI_TAG=.*/GUI_TAG=$VERSION/" .env
          docker compose pull gui
          docker compose up -d gui
          docker image prune -f
